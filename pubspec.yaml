name: daily_schedule
description: Personal daily schedule and checklist app using Flutter, Drift, SQLite, and Riverpod.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter_riverpod: ^3.0.0
  intl: ^0.20.0
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.7.0

flutter:
  uses-material-design: true
